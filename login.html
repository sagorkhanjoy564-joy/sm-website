<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>লগইন — S.M Smart Technology</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hind Siliguri', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      max-width: 420px;
      width: 100%;
      padding: 36px 28px 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
    }

    .logo-circle {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #fff;
      border: 3px solid #00d4ff;
      box-shadow: 0 0 28px rgba(0,212,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 12px;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 20px rgba(0,212,255,0.3); }
      50%      { box-shadow: 0 0 44px rgba(0,212,255,0.7); }
    }

    .logo-text-big {
      font-size: 1.4rem;
      font-weight: 700;
      color: #00d4ff;
      letter-spacing: 0.04em;
      text-align: center;
    }

    .logo-text-sub {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.45);
      text-align: center;
      margin-top: 2px;
      letter-spacing: 0.08em;
    }

    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(0,212,255,0.4), transparent);
      margin: 20px 0;
    }

    .field-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: rgba(255,255,255,0.6);
      margin-bottom: 7px;
      letter-spacing: 0.05em;
    }

    .field-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    .field-wrap input {
      width: 100%;
      padding: 13px 16px 13px 44px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .field-wrap input::placeholder { color: rgba(255,255,255,0.3); }
    .field-wrap input:focus {
      border-color: #00d4ff;
      background: rgba(0,212,255,0.07);
    }

    .field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.5;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #00d4ff, #0077ff);
      color: #fff;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      box-shadow: 0 8px 24px rgba(0,180,255,0.35);
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 6px;
    }

    .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-login:active { transform: scale(0.98); }

    .support-section {
      margin-top: 28px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px 18px;
    }

    .support-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 14px;
    }

    .support-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-support {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 8px;
      border-radius: 10px;
      font-family: 'Hind Siliguri', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-support:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-support:active { transform: scale(0.97); }

    .btn-whatsapp {
      background: #25D366;
      color: #fff;
    }

    .btn-telegram {
      background: #229ED9;
      color: #fff;
    }

    .btn-support svg {
      width: 18px;
      height: 18px;
      fill: #fff;
      flex-shrink: 0;
    }

    @media (max-width: 380px) {
      .card { padding: 24px 16px 20px; }
      .logo-circle { width: 76px; height: 76px; }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="logo-wrap">
      <div class="logo-circle">
        <!-- SM Tech logo placeholder — replace src with your actual logo image -->
        <svg viewBox="0 0 80 80" width="70" height="70" xmlns="http://www.w3.org/2000/svg">
          <rect width="80" height="80" rx="40" fill="#0a0a1a"/>
          <text x="40" y="34" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="18" font-weight="900" fill="#00d4ff">S.M</text>
          <text x="40" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#ffffff" letter-spacing="1">SMART TECH</text>
          <text x="40" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#00d4ff">2.01</text>
        </svg>
      </div>
      <div class="logo-text-big">S.M Smart Technology</div>
      <div class="logo-text-sub">VERSION 2.01</div>
    </div>

    <div class="divider"></div>

    <div class="field-wrap">
      <div class="field-label">ইউজারনেম</div>
      <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)">
        <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
      </svg>
      <input type="text" placeholder="আপনার ইউজারনেম লিখুন" />
    </div>

    <div class="field-wrap">
      <div class="field-label">পাসওয়ার্ড</div>
      <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)">
        <path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3-9H9V6a3 3 0 0 1 6 0v2z"/>
      </svg>
      <input type="password" placeholder="আপনার পাসওয়ার্ড লিখুন" />
    </div>

    <div id="msg-box" style="display:none; padding:12px 16px; border-radius:10px; margin-bottom:14px; font-size:0.9rem; text-align:center;"></div>

    <button class="btn-login" onclick="doLogin()">লগইন করুন →</button>

  <script>
  async function doLogin() {
    const btn = document.querySelector('.btn-login');
    const msg = document.getElementById('msg-box');

    const data = new FormData();
    data.append('username', document.querySelectorAll('input')[0].value);
    data.append('password', document.querySelectorAll('input')[1].value);

    btn.disabled = true;
    btn.textContent = 'অপেক্ষা করুন...';

    try {
      const res  = await fetch('login.php', { method: 'POST', body: data });
      const json = await res.json();

      msg.style.display = 'block';
      if (json.status === 'success') {
        msg.style.background = 'rgba(0,200,100,0.15)';
        msg.style.border = '1px solid rgba(0,200,100,0.3)';
        msg.style.color = '#00c864';
        msg.textContent = json.message;
        setTimeout(() => window.location.href = json.redirect || 'dashboard.php', 1200);
      } else {
        msg.style.background = 'rgba(255,60,60,0.12)';
        msg.style.border = '1px solid rgba(255,60,60,0.3)';
        msg.style.color = '#ff6060';
        msg.textContent = json.message;
        btn.disabled = false;
        btn.textContent = 'লগইন করুন →';
      }
    } catch(e) {
      msg.style.display = 'block';
      msg.style.color = '#ff6060';
      msg.textContent = 'সংযোগ ব্যর্থ হয়েছে।';
      btn.disabled = false;
      btn.textContent = 'লগইন করুন →';
    }
  }
  </script>

    <div style="text-align:right; margin-top:10px;">
      <a href="forgot-password.html" style="color:rgba(0,212,255,0.7); font-size:0.83rem; text-decoration:none;">পাসওয়ার্ড ভুলে গেছেন?</a>
    </div>

    <div class="login-link" style="text-align:center; margin-top:18px; font-size:0.88rem; color:rgba(255,255,255,0.45);">
      নতুন একাউন্ট নেই? <a href="signup.html" style="color:#00d4ff; text-decoration:none; font-weight:600;">সাইন আপ করুন</a>
    </div>

    <div class="support-section">
      <div class="support-title">সাহায্যের জন্য Admin-কে নক করুন</div>
      <div class="support-buttons">
        <a href="https://wa.me/YOUR_WHATSAPP_NUMBER" target="_blank" class="btn-support btn-whatsapp">
          <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/></svg>
          WhatsApp
        </a>
        <a href="https://t.me/YOUR_TELEGRAM_USERNAME" target="_blank" class="btn-support btn-telegram">
          <svg viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
          Telegram
        </a>
      </div>
    </div>

  </div>
</body>
</html>
